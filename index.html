<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iBoardz - ARDUINO FUTURE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- HEADER -->
  <header id="header">
    <div class="logo" onclick="navigate('home')">
      <span class="logo-text" dir="ltr"><span class="logo-i">i</span><span class="logo-boardz">Boardz</span></span>
      <img src="images/logo.png" alt="iBoardz" class="logo-img" onerror="this.style.display='none'">
    </div>
    <div class="header-actions">
      <button class="cart-btn" onclick="toggleCart()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
        <span id="cart-count" class="cart-count" style="display:none">0</span>
      </button>
      <button class="menu-btn" onclick="toggleMenu()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </header>

  <!-- DROPDOWN MENU -->
  <div id="dropdown-menu" class="dropdown-menu">
    <button onclick="navigate('home')" data-page="home">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      الرئيسية
    </button>
    <button onclick="navigate('products')" data-page="products">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      المنتجات
    </button>
    <button onclick="navigate('features')" data-page="features">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      المميزات
    </button>
    <button onclick="navigate('contact')" data-page="contact">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22 6 12 13 2 6"/></svg>
      تواصل معنا
    </button>
  </div>

  <!-- CART OVERLAY -->
  <div id="cart-overlay" class="overlay" onclick="toggleCart()"></div>
  <div id="cart-sidebar" class="cart-sidebar">
    <div class="cart-header">
      <h2>سلة التسوق (<span id="cart-total-items">0</span>)</h2>
      <button onclick="toggleCart()" class="close-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="cart-items" class="cart-items"></div>
    <div id="cart-footer" class="cart-footer" style="display:none">
      <div id="cart-saved" class="cart-saved"></div>
      <div class="cart-total">
        <span>المجموع:</span>
        <span id="cart-total-price">0 ر.س</span>
      </div>
      <a id="whatsapp-link" href="#" target="_blank" class="whatsapp-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        اطلب عبر واتساب
      </a>
    </div>
  </div>

  <!-- PRODUCT DETAIL MODAL -->
  <div id="product-modal" class="modal-overlay">
    <div class="modal-overlay-bg" onclick="closeProductModal()"></div>
    <div class="modal-content">
      <button class="modal-close" onclick="closeProductModal()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main id="main-content"></main>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <div class="footer-grid">
        <div class="footer-col">
          <div class="footer-logo" dir="ltr"><span class="logo-i">i</span><span>Boardz</span></div>
          <p class="footer-subtitle" dir="ltr">ARDUINO <span style="color:#ff9500">FUTURE</span></p>
          <p class="footer-desc">منصتك الأولى لمكونات الإلكترونيات والبرمجة في المملكة العربية السعودية</p>
        </div>
        <div class="footer-col">
          <h4>روابط سريعة</h4>
          <button onclick="navigate('home')">الرئيسية</button>
          <button onclick="navigate('products')">المنتجات</button>
          <button onclick="navigate('features')">المميزات</button>
          <button onclick="navigate('contact')">تواصل معنا</button>
        </div>
        <div class="footer-col">
          <h4>تواصل معنا</h4>
          <p dir="ltr">واتساب: +966 552 645 082</p>
          <p dir="ltr">البريد: iBoardz@outlook.com</p>
        </div>
      </div>
      <div class="footer-bottom">
        <span dir="ltr">© 2025 iBoardz</span> - جميع الحقوق محفوظة
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
