<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iBoardz - ARDUINO FUTURE</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Tajawal', sans-serif;
  direction: rtl;
  background: #fafafa;
  color: #1a1a2e;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
a { text-decoration: none; color: inherit; }
button { font-family: 'Tajawal', sans-serif; }
img { max-width: 100%; display: block; }

.header {
  position: fixed; top: 0; right: 0; left: 0; height: 70px;
  background: #fff; border-bottom: 1px solid #eee;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; z-index: 1000;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  direction: ltr;
}
.logo { display: flex; align-items: center; cursor: pointer; flex-shrink: 0; }
.logo-text {
  display: inline-flex; align-items: baseline; white-space: nowrap;
  letter-spacing: -0.5px; direction: ltr; font-size: 34px; font-weight: 900;
}
.logo-text .i { color: #ff9500; line-height: 1; }
.logo-text .boardz { color: #1a1a2e; line-height: 1; }
.logo-img { height: 52px; object-fit: contain; margin-right: 8px; display: none; }
.header-actions { display: flex; align-items: center; gap: 10px; direction: rtl; }
.cart-btn {
  position: relative; background: none; border: none; cursor: pointer;
  color: #333; padding: 8px; display: flex; align-items: center;
}
.cart-badge {
  position: absolute; top: 0; right: 0; background: #ff9500; color: #fff;
  border-radius: 50%; width: 20px; height: 20px; font-size: 11px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
}
.menu-btn {
  background: #ff9500; border: none; border-radius: 12px; padding: 10px 14px;
  cursor: pointer; color: #fff; display: flex; align-items: center;
  transition: background 0.2s;
}
.menu-btn:hover { background: #e68600; }

.dropdown-menu {
  position: fixed; top: 74px; right: 24px; background: #fff;
  border-radius: 14px; box-shadow: 0 12px 40px rgba(0,0,0,0.15);
  z-index: 999; min-width: 220px; overflow: hidden;
  animation: fadeIn 0.2s ease;
}
.dropdown-menu button {
  display: flex; align-items: center; gap: 12px; width: 100%;
  padding: 14px 20px; border: none; font-size: 15px;
  cursor: pointer; border-bottom: 1px solid #f5f5f5;
  font-family: 'Tajawal', sans-serif; transition: background 0.15s;
}
.dropdown-menu button:hover { background: #fff8f0; }
.dropdown-menu button.active { background: #fff8f0; color: #ff9500; font-weight: 700; }
.dropdown-menu button:not(.active) { color: #333; font-weight: 500; }

.cart-overlay { position: fixed; inset: 0; z-index: 2000; display: none; }
.cart-overlay.open { display: flex; }
.cart-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
.cart-panel {
  position: absolute; top: 0; left: 0; bottom: 0; width: 100%; max-width: 420px;
  background: #fff; box-shadow: 8px 0 40px rgba(0,0,0,0.12);
  display: flex; flex-direction: column; overflow: hidden;
}
.cart-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 24px; border-bottom: 1px solid #eee;
}
.cart-header h2 { font-size: 20px; font-weight: 800; margin: 0; }
.cart-close { background: none; border: none; cursor: pointer; color: #666; padding: 4px; }
.cart-body { flex: 1; overflow-y: auto; padding: 20px; }
.cart-empty { text-align: center; padding: 60px 20px; color: #bbb; }
.cart-empty p { margin-top: 8px; }
.cart-item {
  display: flex; gap: 14px; padding: 14px 0;
  border-bottom: 1px solid #f5f5f5; align-items: center;
}
.cart-item-img {
  width: 60px; height: 60px; border-radius: 12px; background: #f8f8f8;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; overflow: hidden;
}
.cart-item-img img { width: 48px; height: 48px; object-fit: contain; }
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-name { font-weight: 700; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cart-item-prices { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
.cart-qty-controls { display: flex; align-items: center; gap: 6px; }
.qty-btn {
  width: 30px; height: 30px; border-radius: 8px; border: 1px solid #ddd;
  background: #fff; cursor: pointer; display: flex; align-items: center;
  justify-content: center; color: #333; transition: all 0.15s;
}
.qty-btn:hover { border-color: #ff9500; color: #ff9500; }
.cart-remove { background: none; border: none; cursor: pointer; color: #e74c3c; padding: 4px; margin-right: 2px; }
.cart-footer { border-top: 1px solid #eee; padding: 20px; }
.cart-totals { background: #f8f9fa; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
.cart-total-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
.cart-total-row.original { border-bottom: 1px dashed #ddd; }
.cart-total-row.discounted { padding-top: 10px; }
.cart-total-label { font-weight: 600; font-size: 14px; color: #555; }
.cart-total-old { font-weight: 600; font-size: 15px; color: #999; text-decoration: line-through; }
.cart-total-new { font-weight: 900; font-size: 22px; color: #ff9500; }
.cart-savings-badge {
  background: linear-gradient(135deg, #e8f5e9, #c8e6c9); border-radius: 8px;
  padding: 8px 14px; margin-top: 10px; display: flex; align-items: center;
  gap: 8px; justify-content: center;
}
.savings-icon { font-size: 18px; }
.savings-text { color: #2e7d32; font-weight: 800; font-size: 14px; }
.whatsapp-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  background: #25D366; color: #fff; padding: 10px 16px; border-radius: 10px;
  font-weight: 700; font-size: 14px; border: none; cursor: pointer;
  width: 100%; font-family: 'Tajawal', sans-serif; transition: all 0.2s;
}
.whatsapp-btn:hover { background: #1fb855; transform: translateY(-1px); }

.modal-overlay {
  position: fixed; inset: 0; z-index: 1500;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
.modal-content {
  position: relative; background: #fff; border-radius: 20px; max-width: 520px;
  width: 100%; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,0.2);
}
.modal-close {
  position: absolute; top: 14px; left: 14px; background: #f5f5f5; border: none;
  border-radius: 50%; width: 38px; height: 38px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; z-index: 10;
}
.modal-img {
  background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); padding: 40px;
  display: flex; justify-content: center; border-radius: 20px 20px 0 0;
}
.modal-img img { max-height: 200px; object-fit: contain; }
.modal-body { padding: 28px; }
.modal-badges { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.modal-badges .badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 6px; }
.badge-orange { background: #fff5e6; color: #ff9500; }
.badge-red { background: #fff0f0; color: #e74c3c; }
.badge-gray { background: #f0f0f0; color: #666; }
.modal-title { font-size: 24px; font-weight: 900; margin-bottom: 8px; }
.modal-desc { color: #666; font-size: 15px; line-height: 1.7; margin-bottom: 20px; }
.modal-prices { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.modal-new-price { font-size: 32px; font-weight: 900; color: #ff9500; }
.modal-old-price { font-size: 18px; color: #ccc; text-decoration: line-through; }
.modal-specs {
  background: #f8f9fa; border-radius: 14px; padding: 20px;
  margin-bottom: 24px; border: 1px solid #f0f0f0;
}
.modal-specs h3 { font-weight: 800; margin-bottom: 12px; font-size: 16px; color: #1a1a2e; }
.spec-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
.spec-item + .spec-item { border-top: 1px solid #eee; }
.spec-dot { width: 6px; height: 6px; border-radius: 50%; background: #ff9500; flex-shrink: 0; }
.spec-text { font-size: 14px; color: #444; }
.modal-add-btn {
  width: 100%; padding: 16px 24px; font-size: 17px; background: #ff9500;
  color: #fff; border: none; border-radius: 14px; cursor: pointer;
  font-weight: 700; font-family: 'Tajawal', sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background 0.2s;
}
.modal-add-btn:hover { background: #e68600; }

.main { padding-top: 70px; }

.carousel {
  position: relative; width: 100%; max-width: 1100px; margin: 0 auto;
  aspect-ratio: 2.8/1; overflow: hidden; background: #1a1a2e;
}
.carousel img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; transition: opacity 1s ease;
}
.carousel-overlay {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: linear-gradient(135deg, rgba(26,26,46,0.85) 0%, rgba(26,26,46,0.5) 100%);
}
.carousel-title {
  font-size: clamp(36px, 6vw, 64px); font-weight: 900; color: #fff;
  margin: 0; white-space: nowrap; letter-spacing: -1px;
}
.carousel-title .i { color: #ff9500; }
.carousel-title .boardz { color: #fff; }
.carousel-subtitle {
  color: rgba(255,255,255,0.8); font-size: clamp(14px, 2.5vw, 20px);
  margin-top: 4px; font-weight: 500; letter-spacing: 4px;
}
.carousel-subtitle .future { color: #ff9500; font-weight: 700; }
.carousel-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.85); border: none; border-radius: 50%;
  width: 40px; height: 40px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.carousel-arrow:hover { background: rgba(255,255,255,1); }
.carousel-arrow.next { left: 12px; }
.carousel-arrow.prev { right: 12px; }
.carousel-dots {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px;
}
.carousel-dot {
  height: 10px; border-radius: 5px; border: none; cursor: pointer;
  transition: all 0.3s; background: rgba(255,255,255,0.5);
}
.carousel-dot.active { width: 28px; background: #ff9500; }
.carousel-dot:not(.active) { width: 10px; }

.quick-features { background: #fff; border-bottom: 1px solid #f0f0f0; }
.quick-features-inner {
  max-width: 1100px; margin: 0 auto; padding: 28px 24px;
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;
}
.quick-feature { display: flex; align-items: center; gap: 14px; }
.quick-feature-icon {
  width: 52px; height: 52px; border-radius: 12px; background: #fff8f0;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.quick-feature h3 { font-weight: 700; font-size: 15px; margin: 0; }
.quick-feature p { color: #888; font-size: 13px; margin: 2px 0 0; }

.section { max-width: 1200px; margin: 0 auto; padding: 48px 24px; }
.section-narrow { max-width: 1000px; margin: 0 auto; padding: 48px 24px; }
.section-contact { max-width: 800px; margin: 0 auto; padding: 48px 24px; }
.section-header { text-align: center; margin-bottom: 36px; }
.section-badge {
  display: inline-block; background: #fff5e6; color: #ff9500; font-size: 13px;
  font-weight: 700; padding: 4px 16px; border-radius: 20px; margin-bottom: 10px;
}
.section-title { font-size: 32px; font-weight: 900; margin: 8px 0 0; }
.section-subtitle { color: #999; font-size: 15px; margin-top: 6px; }

.products-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px;
}
.products-grid-large {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px;
}
.product-card {
  background: #fff; border-radius: 16px; border: 1px solid #f0f0f0;
  overflow: hidden; transition: all 0.3s ease;
}
.product-card:hover { transform: translateY(-6px); box-shadow: 0 12px 32px rgba(0,0,0,0.1); }
.product-img {
  position: relative; background: linear-gradient(135deg, #f8f9fa, #fff);
  padding: 20px; display: flex; align-items: center; justify-content: center;
  min-height: 160px; cursor: pointer;
}
.product-img img { max-height: 130px; object-fit: contain; transition: transform 0.3s; }
.product-img-large { min-height: 170px; padding: 24px; }
.product-img-large img { max-height: 140px; }
.product-badge {
  display: inline-block; font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 6px; position: absolute; top: 10px; right: 10px;
}
.badge-primary { background: #ff9500; color: #fff; }
.discount-badge {
  position: absolute; top: 10px; left: 10px;
  background: #fff0f0; color: #e74c3c; font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 6px;
}
.product-info { padding: 14px 16px; }
.product-name {
  font-size: 13px; font-weight: 700; margin-bottom: 10px; min-height: 36px;
  cursor: pointer; line-height: 1.5;
}
.product-name:hover { color: #ff9500; }
.product-bottom { display: flex; align-items: center; justify-content: space-between; }
.product-prices { display: flex; align-items: baseline; gap: 8px; }
.price { color: #ff9500; font-weight: 800; font-size: 17px; }
.old-price { color: #ccc; font-size: 12px; text-decoration: line-through; }
.add-btn {
  width: 38px; height: 38px; border-radius: 10px; background: #ff9500; color: #fff;
  border: none; cursor: pointer; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(255,149,0,0.3);
}
.add-btn:hover { background: #e68600; transform: scale(1.1); }

.filter-bar { display: flex; gap: 10px; margin-bottom: 32px; flex-wrap: wrap; }
.filter-btn {
  padding: 10px 24px; border-radius: 24px; border: none; font-size: 14px;
  cursor: pointer; transition: all 0.2s; font-family: 'Tajawal', sans-serif;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.filter-btn.active { background: #ff9500; color: #fff; font-weight: 700; box-shadow: 0 4px 12px rgba(255,149,0,0.3); }
.filter-btn:not(.active) { background: #fff; color: #555; font-weight: 500; }
.filter-btn:not(.active):hover { background: #f5f5f5; }

.show-all-btn {
  padding: 16px 48px; background: #ff9500; color: #fff; border: none;
  border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer;
  font-family: 'Tajawal', sans-serif; transition: all 0.25s;
  box-shadow: 0 4px 16px rgba(255,149,0,0.3);
  display: inline-flex; align-items: center; gap: 8px;
}
.show-all-btn:hover { background: #e68600; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,149,0,0.4); }

.features-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 18px; margin-bottom: 56px;
}
.feature-card {
  padding: 28px; background: #fff; border-radius: 16px;
  border: 1px solid #f0f0f0; transition: all 0.3s;
}
.feature-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
.feature-num {
  width: 44px; height: 44px; border-radius: 10px; background: #fff5e6;
  display: flex; align-items: center; justify-content: center;
  color: #ff9500; font-weight: 900; font-size: 18px; margin-bottom: 12px;
}
.feature-card h3 { font-weight: 800; margin-bottom: 6px; font-size: 17px; }
.feature-card p { color: #777; font-size: 14px; line-height: 1.6; }

.reviews-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px;
}
.review-card {
  padding: 24px; background: #fff; border-radius: 16px; border: 1px solid #f0f0f0;
}
.review-stars { display: flex; gap: 3px; margin-bottom: 12px; }
.review-stars span { color: #ff9500; font-size: 16px; }
.review-text { color: #444; font-size: 14px; line-height: 1.8; margin-bottom: 16px; }
.review-author {
  border-top: 1px solid #f0f0f0; padding-top: 14px;
  display: flex; align-items: center; gap: 10px; margin-top: 16px;
}
.review-avatar {
  width: 36px; height: 36px; border-radius: 50%; background: #ff9500;
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px;
}
.review-name { font-weight: 700; font-size: 14px; color: #444; }

.contact-cards {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 36px;
}
.contact-card {
  display: flex; align-items: center; gap: 16px; padding: 24px;
  border-radius: 16px; text-decoration: none; border: 1px solid;
  transition: all 0.2s;
}
.contact-card:hover { transform: translateY(-2px); }
.contact-card.whatsapp { background: #f0fdf4; border-color: #dcfce7; }
.contact-card.email { background: #eff6ff; border-color: #dbeafe; }
.contact-icon {
  width: 52px; height: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.contact-icon.whatsapp-icon { background: #25D366; color: #fff; }
.contact-icon.email-icon { background: #3b82f6; color: #fff; }
.contact-label { font-weight: 800; color: #1a1a2e; font-size: 16px; margin-bottom: 2px; }
.contact-value { color: #666; font-size: 14px; direction: ltr; text-align: right; }
.contact-form {
  background: #fff; border-radius: 20px; padding: 32px;
  border: 1px solid #f0f0f0; margin-bottom: 24px;
}
.contact-form h2 { font-weight: 800; margin-bottom: 24px; font-size: 20px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 14px; }
.form-input {
  width: 100%; padding: 12px 16px; border-radius: 10px; border: 1.5px solid #e0e0e0;
  font-size: 14px; outline: none; font-family: 'Tajawal', sans-serif;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: #ff9500; }
textarea.form-input { resize: vertical; }
.submit-btn {
  width: 100%; padding: 16px; font-size: 17px; background: #ff9500;
  color: #fff; border: none; border-radius: 14px; cursor: pointer;
  font-weight: 700; font-family: 'Tajawal', sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background 0.2s;
}
.submit-btn:hover { background: #e68600; }
.work-hours {
  padding: 24px; background: #fff9f0; border-radius: 16px;
  border: 1px solid #ffe0b2; text-align: center;
}
.work-hours h3 { font-weight: 800; margin-bottom: 10px; font-size: 17px; }
.work-hours p { color: #666; font-size: 14px; margin-bottom: 4px; }

.footer {
  background: #1a1a2e; color: #fff; padding: 48px 24px 24px; margin-top: 0;
}
.footer-inner { max-width: 1000px; margin: 0 auto; }
.footer-top { display: flex; flex-wrap: wrap; gap: 40px; margin-bottom: 32px; }
.footer-col { flex: 1; min-width: 220px; }
.footer-logo {
  font-size: 28px; font-weight: 900; margin-bottom: 8px;
  display: inline-flex; align-items: baseline; white-space: nowrap;
  letter-spacing: -0.5px; direction: ltr;
}
.footer-logo .i { color: #ff9500; }
.footer-logo .boardz { color: #fff; }
.footer-subtitle {
  color: #888; font-size: 14px; margin-bottom: 4px;
  letter-spacing: 3px; direction: ltr; text-align: right;
}
.footer-subtitle .future { color: #ff9500; }
.footer-desc { color: #666; font-size: 13px; line-height: 1.7; margin-top: 8px; }
.footer h4 { font-weight: 800; margin-bottom: 16px; color: #ff9500; font-size: 16px; }
.footer-links button {
  display: block; background: none; border: none; color: #aaa;
  padding: 5px 0; cursor: pointer; font-size: 14px;
  font-family: 'Tajawal', sans-serif; text-align: right; transition: color 0.2s;
}
.footer-links button:hover { color: #ff9500; }
.footer-contact p { color: #aaa; font-size: 14px; margin-bottom: 6px; direction: ltr; text-align: right; }
.footer-bottom {
  border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;
  text-align: center; color: #555; font-size: 13px;
}
.footer-bottom span { direction: ltr; display: inline-block; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
@keyframes slideIn { from { transform: translateX(-100%); } to { transform: none; } }

@media (max-width: 768px) {
  .header { padding: 0 16px; height: 60px; }
  .logo-text { font-size: 22px; }
  .main { padding-top: 60px; }
  .carousel { aspect-ratio: 1.5/1; }
  .carousel-title { font-size: clamp(28px, 7vw, 48px); }
  .section, .section-narrow, .section-contact { padding: 32px 16px; }
  .section-title { font-size: 26px; }
  .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .products-grid-large { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; }
  .product-img { min-height: 120px; padding: 14px; }
  .product-img img { max-height: 100px; }

let state = { page:'home', menuOpen:false, cartOpen:false, cart:[], filter:'all', ci:0, selProd:null };
let carouselTimer = null;

function loadCart() { try { const s=localStorage.getItem('iboardz-cart'); if(s) state.cart=JSON.parse(s); } catch{} }
function saveCart() { try { localStorage.setItem('iboardz-cart',JSON.stringify(state.cart)); } catch{} }
loadCart();

// ===== HELPERS =====
function disc(p) { return Math.round((1-p.price/p.op)*100); }
function totalItems() { return state.cart.reduce((s,i)=>s+i.qty,0); }
function totalPrice() { return state.cart.reduce((s,i)=>s+i.product.price*i.qty,0); }
function totalOriginal() { return state.cart.reduce((s,i)=>s+i.product.op*i.qty,0); }
function totalSaved() { return totalOriginal()-totalPrice(); }

function nav(p) { state.page=p; state.menuOpen=false; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function toggleMenu(e) { e.stopPropagation(); state.menuOpen=!state.menuOpen; renderMenu(); }
function closeMenu() { state.menuOpen=false; renderMenu(); }
function openCart() { state.cartOpen=true; renderCart(); }
function closeCart() { state.cartOpen=false; renderCart(); }

function addCart(prod) {
  const ex=state.cart.find(i=>i.product.id===prod.id);
  if(ex) ex.qty++; else state.cart.push({product:prod,qty:1});
  saveCart(); updateBadge();
  state.cartOpen=true; renderCart();
  setTimeout(()=>{state.cartOpen=false; renderCart();},2000);
}
function removeCart(id) { state.cart=state.cart.filter(i=>i.product.id!==id); saveCart(); updateBadge(); renderCart(); }
function updQty(id,d) {
  const item=state.cart.find(i=>i.product.id===id);
  if(item) item.qty=Math.max(1,item.qty+d);
  saveCart(); renderCart();
}

function updateBadge() {
  const b=document.getElementById('cartBadge');
  const t=totalItems();
  if(t>0) { b.style.display='flex'; b.textContent=t; }
  else { b.style.display='none'; }
}

function showProduct(id) {
  state.selProd=products.find(p=>p.id===id);
  renderModal();
}
function closeModal() { state.selProd=null; renderModal(); }

// ===== RENDER =====
function render() {
  renderMain();
  renderMenu();
  updateBadge();
  startCarousel();
}

function renderMenu() {
  const dd=document.getElementById('dropdown');
  const bd=document.getElementById('menuBackdrop');
  if(state.menuOpen) {
    dd.style.display='block';
    bd.style.display='block';
    dd.innerHTML=navItems.map(n=>`<button class="${state.page===n.key?'active':''}" onclick="nav('${n.key}')">${svgIcon(icons[n.key==='home'?'home':n.key==='products'?'box':n.key==='features'?'star':'envelope'])} ${n.label}</button>`).join('');
  } else {
    dd.style.display='none';
    bd.style.display='none';
  }
}

function renderCart() {
  const overlay=document.getElementById('cartOverlay');
  const body=document.getElementById('cartBody');
  const footer=document.getElementById('cartFooter');
  const count=document.getElementById('cartCount');

  overlay.className='cart-overlay'+(state.cartOpen?' open':'');
  count.textContent=totalItems();

  if(state.cart.length===0) {
    body.innerHTML=`<div class="cart-empty">${svgIcon(icons.box,40,'#ccc')}<p style="font-size:16px;margin-top:12px">السلة فارغة</p><p style="font-size:13px">أضف منتجات للبدء</p></div>`;

    body.innerHTML=state.cart.map(item=>`<div class="cart-item">
      <div class="cart-item-img"><img src="images/${item.product.img}" alt="" onerror="this.style.display='none'"></div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.product.name}</div>
        <div class="cart-item-prices"><span class="price" style="font-size:15px">${item.product.price} ر.س</span><span class="old-price">${item.product.op} ر.س</span></div>
      </div>
      <div class="cart-qty-controls">
        <button class="qty-btn" onclick="updQty(${item.product.id},-1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        <span style="font-weight:800;min-width:20px;text-align:center;font-size:15px">${item.qty}</span>
        <button class="qty-btn" onclick="updQty(${item.product.id},1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        <button class="cart-remove" onclick="removeCart(${item.product.id})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
      </div>
    </div>`).join('');

    const tp=totalPrice(), top2=totalOriginal(), ts=totalSaved();
    const waText=encodeURIComponent('مرحباً، أريد طلب:\n'+state.cart.map(i=>`${i.product.name} × ${i.qty} = ${i.product.price*i.qty} ر.س`).join('\n')+'\nالمجموع: '+tp+' ر.س');

    footer.style.display='block';
    footer.innerHTML=`<div class="cart-totals">
      <div class="cart-total-row original"><span class="cart-total-label">الإجمالي قبل الخصم:</span><span class="cart-total-old">${top2} ر.س</span></div>
      <div class="cart-total-row discounted"><span class="cart-total-label">الإجمالي بعد الخصم:</span><span class="cart-total-new">${tp} ر.س</span></div>
      ${ts>0?`<div class="cart-savings-badge"><span class="savings-icon">🎉</span><span class="savings-text">وفّرت ${ts} ر.س</span></div>`:''}
    </div>
    <a href="https://wa.me/966552645082?text=${waText}" target="_blank" rel="noopener noreferrer"><button class="whatsapp-btn">${svgIcon(icons.whatsapp,20,'#25D366','#25D366')} اطلب عبر واتساب</button></a>`;
  }
}

function renderModal() {
  const m=document.getElementById('modalOverlay');
  if(!state.selProd) { m.style.display='none'; return; }
  const p=state.selProd;
  const cat=cats.find(c=>c.key===p.cat);
  m.style.display='flex';
  m.innerHTML=`<div class="modal-backdrop" onclick="closeModal()"></div>
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <div class="modal-img"><img src="images/${p.img}" alt="${p.name}" onerror="this.style.display='none'"></div>
      <div class="modal-body">
        <div class="modal-badges">
          <span class="badge badge-orange">${cat?.label||''}</span>
          ${p.badge?`<span class="badge badge-red">${p.badge}</span>`:''}
          <span class="badge badge-gray">-${disc(p)}%</span>
        </div>
        <h2 class="modal-title">${p.name}</h2>
        <p class="modal-desc">${p.desc}</p>
        <div class="modal-prices"><span class="modal-new-price">${p.price} ر.س</span><span class="modal-old-price">${p.op} ر.س</span></div>
        <div class="modal-specs"><h3>المواصفات التقنية:</h3>${p.specs.map(s=>`<div class="spec-item"><div class="spec-dot"></div><span class="spec-text">${s}</span></div>`).join('')}</div>
        <button class="modal-add-btn" onclick="addCart(products.find(x=>x.id===${p.id}));closeModal()">أضف إلى السلة <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      </div>
    </div>`;
}

function productCard(p, large) {
  return `<div class="product-card">
    <div class="product-img${large?' product-img-large':''}" onclick="showProduct(${p.id})">
      <img src="images/${p.img}" alt="${p.name}" onerror="this.style.display='none'">
      ${p.badge?`<span class="product-badge badge-primary">${p.badge}</span>`:''}
      <span class="discount-badge">-${disc(p)}%</span>
    </div>
    <div class="product-info">
      <h3 class="product-name" onclick="showProduct(${p.id})">${p.name}</h3>
      <div class="product-bottom">
        <div class="product-prices">
          <span class="price">${p.price} ر.س</span>
          <span class="old-price">${p.op} ر.س</span>
        </div>
        <button class="add-btn" onclick="event.stopPropagation();addCart(products.find(x=>x.id===${p.id}))"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      </div>
    </div>
  </div>`;
}

function renderMain() {
  const main=document.getElementById('mainContent');
  const fl=document.getElementById('footerLinks');
  fl.innerHTML=navItems.map(n=>`<button onclick="nav('${n.key}')">${n.label}</button>`).join('');

  if(state.page==='home') {
    main.innerHTML=renderHome();
  } else if(state.page==='products') {
    main.innerHTML=renderProducts();
  } else if(state.page==='features') {
    main.innerHTML=renderFeatures();
  } else if(state.page==='contact') {
    main.innerHTML=renderContact();
  }
}

  return `

    </div>
    <button class="carousel-arrow prev" onclick="setCi(${(state.ci-1+2)%2})">${svgIcon('<polyline points="9 18 15 12 9 6"/>',22)}</button>

    <div class="carousel-dots">

      <div class="quick-feature"><div class="quick-feature-icon">${svgIcon(icons.shield,28,'#ff9500')}</div><div><h3>ضمان كامل</h3><p>ضمان على جميع المنتجات</p></div></div>
      <div class="quick-feature"><div class="quick-feature-icon">${svgIcon(icons.headset,28,'#ff9500')}</div><div><h3>دعم فني</h3><p>+966 552 645 082</p></div></div>
    </div>
  </div>
  <div class="section">
    <div class="section-header">
      <div class="section-badge">الأكثر مبيعاً</div>
      <h2 class="section-title">الأكثر رواجاً</h2>
      <p class="section-subtitle">المنتجات الأكثر طلباً من عملائنا</p>

  </div>`;
}

function renderProducts() {
  const filtered=state.filter==='all'?products:products.filter(p=>p.cat===state.filter);
  return `<div class="section">
    <div style="margin-bottom:32px"><h1 style="font-size:34px;font-weight:900;margin:0 0 4px">المنتجات</h1><p style="color:#999;font-size:15px;margin:0">جميع الأسعار هي أسعار بعد الخصم</p></div>
    <div class="filter-bar">${cats.map(c=>`<button class="filter-btn${state.filter===c.key?' active':''}" onclick="setFilter('${c.key}')">${c.label}</button>`).join('')}</div>
    <div class="products-grid-large">${filtered.map(p=>productCard(p,true)).join('')}</div>
  </div>`;
}

function renderFeatures() {
  return `<div class="section-narrow">
    <div class="section-header">
      <div class="section-badge">لماذا نحن؟</div>
      <h1 class="section-title">لماذا <span style="direction:ltr;display:inline-block">iBoardz</span>؟</h1>

      <h2 style="font-size:28px;font-weight:900;margin:0 0 6px">آراء عملائنا</h2>

function renderContact() {
  return `<div class="section-contact">

      <div class="section-badge">نحن هنا لمساعدتك</div>
      <h1 class="section-title">تواصل معنا</h1>
      <p class="section-subtitle">نرحب بتواصلك في أي وقت</p>
    </div>
    <div class="contact-cards">
      <a href="https://wa.me/966552645082" target="_blank" rel="noopener noreferrer" class="contact-card whatsapp">
        <div class="contact-icon whatsapp-icon">${svgIcon(icons.phone,20,'#fff')}</div>
        <div><div class="contact-label">واتساب</div><div class="contact-value">+966 552 645 082</div></div>
      </a>
      <a href="mailto:iBoardz@outlook.com" class="contact-card email">
        <div class="contact-icon email-icon">${svgIcon(icons.envelope,20,'#fff')}</div>
        <div><div class="contact-label">البريد الإلكتروني</div><div class="contact-value">iBoardz@outlook.com</div></div>

    </div>

        <div class="form-group"><label>البريد الإلكتروني</label><input type="email" class="form-input" placeholder="email@example.com" style="direction:ltr;text-align:right"></div>
        <div class="form-group"><label>الرسالة</label><textarea rows="5" class="form-input" placeholder="اكتب رسالتك هنا..."></textarea></div>
        <button type="submit" class="submit-btn">إرسال الرسالة</button>
      </form>

    <div class="work-hours"><h3>ساعات العمل</h3><p>السبت - الخميس: 9 صباحاً - 11 مساءً</p><p style="margin-bottom:0">الجمعة: 4 مساءً - 11 مساءً</p></div>
  </div>`;
}

function setCi(i) { state.ci=i; document.querySelector('.carousel')?.parentElement && renderMain(); startCarousel(); }
function setFilter(f) { state.filter=f; renderMain(); }

function startCarousel() {
  if(carouselTimer) clearInterval(carouselTimer);
  carouselTimer=setInterval(()=>{
    state.ci=(state.ci+1)%2;
    const imgs=document.querySelectorAll('.carousel>img');
    const dots=document.querySelectorAll('.carousel-dot');
    imgs.forEach((img,i)=>img.style.opacity=i===state.ci?1:0);
    dots.forEach((dot,i)=>{dot.className='carousel-dot'+(i===state.ci?' active':'');});
  },4000);
}

// ===== INIT =====
render();
renderCart();
</script>
