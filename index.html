function disc(p){return Math.round((1-p.price/p.originalPrice)*100)}

function cTotalOrig(){return state.cart.reduce((s,c)=>{const p=products.find(x=>x.id===c.id);return s+(p?p.originalPrice*c.qty:0)},0)}

function rHome(){const pop=products.filter(p=>p.popular);return rCar()+`<div class="features-bar"><div class="feature-item">${S.truck}<span>شحن سريع</span></div><div class="feature-item">${S.shield}<span>ضمان كامل</span></div><div class="feature-item">${S.hp}<span>دعم متواصل</span></div></div><section class="section"><div class="section-badge">الأكثر رواجاً</div><h2 class="section-title">المنتجات الأكثر مبيعاً</h2><div class="products-grid">${pop.map(p=>rCard(p)).join('')}</div></section>`}
function rProd(){return`<section class="section"><div class="section-badge">المنتجات</div><h2 class="section-title">جميع المنتجات</h2><div class="filter-bar">${Object.entries(catNames).map(([k,v])=>`<button class="filter-btn ${state.filter===k?'active':''}" onclick="sFilt('${k}')">${v}</button>`).join('')}</div>${state.filter==='all'||state.filter==='microcontrollers'?`<h3 style="font-size:20px;font-weight:800;margin:24px 0 16px;color:#4f46e5">المتحكمات الدقيقة</h3><div class="products-grid">${products.filter(p=>p.category==='microcontrollers').map(p=>rCard(p)).join('')}</div>`:''} ${state.filter==='all'||state.filter==='sensors'?`<h3 style="font-size:20px;font-weight:800;margin:24px 0 16px;color:#16a34a">الحساسات</h3><div class="products-grid">${products.filter(p=>p.category==='sensors').map(p=>rCard(p)).join('')}</div>`:''} ${state.filter==='all'||state.filter==='displays'?`<h3 style="font-size:20px;font-weight:800;margin:24px 0 16px;color:#9333ea">الشاشات</h3><div class="products-grid">${products.filter(p=>p.category==='displays').map(p=>rCard(p)).join('')}</div>`:''}</section>`}
function rCard(p){const d=disc(p);const ic=state.cart.find(c=>c.id===p.id);return`<div class="product-card"><div class="product-img-wrap" onclick="oMod(${p.id})"><img src="images/${p.image}" alt="${p.name}" onerror="this.src='${phSVG(p.category)}'"><div class="discount-badge">-${d}%</div>${p.badge?`<div class="popular-badge">${p.badge}</div>`:''}</div><div class="product-info"><div class="product-name">${p.name}</div><div class="product-cat">${catNames[p.category]}</div><div class="product-prices"><span class="old-price">${p.originalPrice} ر.س</span><span class="new-price">${p.price}</span><span class="price-sar">ر.س</span></div><div class="product-actions"><button class="add-btn" onclick="aCart(${p.id})">${ic?`<span>${ic.qty} في السلة</span>`:'<span>+ أضف للسلة</span>'}</button><button class="view-btn" onclick="oMod(${p.id})">${S.eye}</button></div></div></div>`}
function rFeat(){const f=[{i:S.shield,t:'جودة عالية',d:'جميع منتجاتنا أصلية ومضمونة مع فحص شامل قبل الشحن'},{i:S.truck,t:'شحن سريع',d:'نوصل طلبك لباب بيتك في أسرع وقت ممكن لجميع مناطق المملكة'},{i:S.hp,t:'دعم فني متواصل',d:'فريق دعم فني متخصص جاهز لمساعدتك على مدار الساعة'},{i:S.check,t:'ضمان كامل',d:'ضمان على جميع المنتجات مع إمكانية الاستبدال المجاني'},{i:S.box,t:'أسعار تنافسية',d:'أفضل الأسعار في المملكة مع عروض وخصومات مستمرة'},{i:S.star,t:'موارد تعليمية',d:'شروحات وأكواد جاهزة لمساعدتك في مشاريعك'}];return`<section class="section"><div class="section-badge">المميزات</div><h2 class="section-title">لماذا <span dir="ltr" style="display:inline-block">iBoardz</span>؟</h2><div class="features-grid">${f.map(x=>`<div class="feature-card"><div class="feature-icon">${x.i}</div><h3>${x.t}</h3><p>${x.d}</p></div>`).join('')}</div></section><section class="section"><div class="section-badge">آراء العملاء</div><h2 class="section-title">ماذا يقول عملاؤنا</h2><div class="reviews-grid">${reviews.map(rv=>`<div class="review-card"><div class="review-stars">★★★★★</div><div class="review-text">"${rv.text}"</div><div class="review-author"><div class="review-avatar">${rv.name.charAt(0)}</div><div class="review-name">${rv.name}</div></div></div>`).join('')}</div></section>`}
function rCont(){return`<section class="section"><div class="section-badge">تواصل معنا</div><h2 class="section-title">نسعد بتواصلكم</h2><div class="contact-grid"><div class="contact-card"><h3>معلومات التواصل</h3><div class="contact-item">${S.phone}<div class="contact-item-text"><span>واتساب</span><strong dir="ltr">+966552645082</strong></div></div><div class="contact-item">${S.mail}<div class="contact-item-text"><span>البريد الإلكتروني</span><strong dir="ltr">iBoardz@outlook.com</strong></div></div><div class="contact-item">${S.map}<div class="contact-item-text"><span>العنوان</span><strong>المملكة العربية السعودية</strong></div></div><a href="https://wa.me/966552645082" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px;padding:14px;border-radius:14px;background:#25d366;color:#fff;font-weight:800;font-size:15px;text-decoration:none">${S.wa} تواصل عبر واتساب</a></div><div class="contact-card"><h3>أرسل رسالة</h3><form class="contact-form" onsubmit="sForm(event)"><input type="text" placeholder="الاسم الكامل" required><input type="email" placeholder="البريد الإلكتروني" required><input type="text" placeholder="الموضوع" required><textarea placeholder="رسالتك..." required></textarea><button type="submit" class="send-btn">إرسال الرسالة</button></form></div></div></section>`}
function rFoot(){return`<footer class="footer"><div class="footer-top"><div class="footer-logo"><div class="logo-text" style="direction:ltr"><span class="io">i</span><span class="rest" style="color:#fff">Boardz</span></div><div class="logo-sub" style="margin-top:6px"><span class="w" style="color:#999">ARDUINO</span> <span class="o">FUTURE</span></div><p style="margin-top:12px">وجهتك الأولى لمكونات الإلكترونيات ولوحات Arduino في المملكة العربية السعودية</p></div><div class="footer-col"><h4>روابط سريعة</h4><a href="#" onclick="goTo('home');return false">الرئيسية</a><a href="#" onclick="goTo('products');return false">المنتجات</a><a href="#" onclick="goTo('features');return false">المميزات</a><a href="#" onclick="goTo('contact');return false">تواصل معنا</a></div><div class="footer-col"><h4>الأقسام</h4><a href="#" onclick="sFilt('microcontrollers');goTo('products');return false">المتحكمات الدقيقة</a><a href="#" onclick="sFilt('sensors');goTo('products');return false">الحساسات</a><a href="#" onclick="sFilt('displays');goTo('products');return false">الشاشات</a></div></div><div class="footer-bottom"><span dir="ltr" style="display:inline-block">© 2025 iBoardz</span> - جميع الحقوق محفوظة</div></footer>`}
function rCart(){const t=cTotal(),sv=cSaved(),to=cTotalOrig();return`<div class="cart-overlay ${state.cartOpen?'show':''}" onclick="tCart()"></div><div class="cart-panel ${state.cartOpen?'show':''}"><div class="cart-header"><h2>سلة التسوق</h2><button class="cart-close" onclick="tCart()">${S.close}</button></div><div class="cart-items">${state.cart.length===0?`<div class="cart-empty">${S.cart}<p>السلة فارغة</p></div>`:state.cart.map(c=>{const p=products.find(x=>x.id===c.id);if(!p)return'';return`<div class="cart-item"><div class="cart-item-img"><img src="images/${p.image}" alt="${p.name}" onerror="this.src='${phSVG(p.category)}'"></div><div class="cart-item-info"><div class="cart-item-name">${p.name}</div><div class="cart-item-price">${p.price*c.qty} ر.س</div><div class="cart-item-qty"><button class="qty-btn" onclick="cQty(${p.id},1)">+</button><span>${c.qty}</span><button class="qty-btn" onclick="cQty(${p.id},-1)">−</button></div></div><button class="cart-item-remove" onclick="rmCart(${p.id})">×</button></div>`}).join('')}</div>${state.cart.length>0?`<div class="cart-footer"><div class="cart-totals"><div class="cart-total-row original"><span class="cart-total-label">الإجمالي قبل الخصم:</span><span class="cart-total-old">${to} ر.س</span></div><div class="cart-total-row discounted"><span class="cart-total-label">الإجمالي بعد الخصم:</span><span class="cart-total-new">${t} ر.س</span></div>${sv>0?`<div class="cart-savings-badge"><span style="font-size:18px">🎉</span><span class="savings-text">وفّرت ${sv} ر.س</span></div>`:''}</div><a href="https://wa.me/966552645082?text=${encodeURIComponent('مرحباً، أريد طلب:\n'+state.cart.map(c=>{const p=products.find(x=>x.id===c.id);return p?`- ${p.name} × ${c.qty} = ${p.price*c.qty} ر.س`:''}).join('\n')+'\nالمجموع: '+t+' ر.س')}" target="_blank" class="whatsapp-btn">${S.wa} اطلب عبر واتساب</a></div>`:''}</div>`}
function rMod(){const p=products.find(x=>x.id===state.modalProduct);if(!p)return'';const d=disc(p),sv=p.originalPrice-p.price;return`<div class="modal-overlay show" onclick="if(event.target===this)cMod()"><div class="modal-content"><div class="modal-img"><img src="images/${p.image}" alt="${p.name}" onerror="this.src='${phSVG(p.category)}'"></div><div class="modal-body"><div class="modal-cat">${catNames[p.category]}</div><div class="modal-title">${p.name}</div><div class="modal-desc">${p.description}</div><div class="modal-prices"><span class="modal-old-price">${p.originalPrice} ر.س</span><span class="modal-new-price">${p.price}</span><span style="font-size:16px;font-weight:700;color:#ff9500">ر.س</span></div><div class="modal-saved">وفّرت ${sv} ر.س (-${d}%)</div><div class="modal-specs-title">المواصفات التقنية</div><div class="modal-specs">${p.specs.map(s=>`<div class="modal-spec">${S.check}<span>${s}</span></div>`).join('')}</div><button class="modal-add-btn" onclick="aCart(${p.id});cMod()">أضف إلى السلة - ${p.price} ر.س</button></div></div></div>`}
function goTo(p){state.page=p;state.menuOpen=false;r();window.scrollTo(0,0)}
function tMenu(){state.menuOpen=!state.menuOpen;r()}
function tCart(){state.cartOpen=!state.cartOpen;r()}
function sFilt(f){state.filter=f;r()}
function oMod(id){state.modalProduct=id;r();document.body.style.overflow='hidden'}
function cMod(){state.modalProduct=null;r();document.body.style.overflow=''}
function aCart(id){const e=state.cart.find(c=>c.id===id);if(e)e.qty++;else state.cart.push({id,qty:1});saveCart();r()}
function cQty(id,d){const i=state.cart.find(c=>c.id===id);if(i){i.qty+=d;if(i.qty<=0)state.cart=state.cart.filter(c=>c.id!==id)}saveCart();r()}
function rmCart(id){state.cart=state.cart.filter(c=>c.id!==id);saveCart();r()}
function pSlide(){state.carousel=(state.carousel-1+2)%2;r()}
function nSlide(){state.carousel=(state.carousel+1)%2;r()}
function gSlide(i){state.carousel=i;r()}
function sForm(e){e.preventDefault();const f=e.target;window.open(`https://wa.me/966552645082?text=${encodeURIComponent('الاسم: '+f[0].value+'\nالإيميل: '+f[1].value+'\nالموضوع: '+f[2].value+'\nالرسالة: '+f[3].value)}`,'_blank')}
function bindE(){clearInterval(window._ct);window._ct=setInterval(()=>{state.carousel=(state.carousel+1)%2;r()},5000)}
document.addEventListener('DOMContentLoaded',function(){r();document.addEventListener('click',function(e){if(state.menuOpen&&!e.target.closest('.dropdown-menu')&&!e.target.closest('.menu-btn')){state.menuOpen=false;r()}})});
    </script>
</body>
